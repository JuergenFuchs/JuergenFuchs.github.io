<script>

    $('.flexslider').flexslider({
      animation: "slide",
      controlNav: true,
      directionNav: true

    $('#fh5co-main-nav a[data-nav-section]').on('click', function(e) {
      e.preventDefault();
      var section = $(this).data('nav-section');
      window.location.href = 'index.html#' + section;
    });
  });
</script>
